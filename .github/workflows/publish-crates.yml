name: publish-crates

on:
  workflow_dispatch:
    inputs:
      package:
        description: Crate package to publish.
        required: true
        default: all
        type: choice
        options:
          - all
          - weaver-reed-solomon
          - weaver-unrar
          - weaver-par2
      version:
        description: Package version to publish, for example 0.1.1.
        required: true
        type: string
      dry_run:
        description: Run preflight only without publishing to crates.io.
        required: true
        default: true
        type: boolean

concurrency:
  group: rarpar-publish-${{ inputs.package }}-${{ inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  GIT_LFS_SKIP_SMUDGE: "1"
  WEAVER_LFS_ALL_FIXTURES: crates/weaver-unrar/tests/fixtures/**,crates/weaver-par2/tests/fixtures/**

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      RUSTFLAGS: --remap-path-prefix=${{ github.workspace }}=. -C link-arg=-fuse-ld=mold
      CC: sccache cc
      CXX: sccache c++
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
    steps:
      - uses: actions/checkout@v7
      - name: Hydrate test fixtures
        run: |
          set -euo pipefail
          git lfs install --local
          git lfs pull --include="$WEAVER_LFS_ALL_FIXTURES" --exclude=""
          git lfs fsck --pointers

          while IFS= read -r path; do
            [ -f "$path" ] || continue
            if head -c 43 "$path" | grep -q '^version https://git-lfs.github.com/spec'; then
              echo "::error file=${path}::fixture is still a Git LFS pointer"
              exit 1
            fi
          done < <(git lfs ls-files --name-only --include="$WEAVER_LFS_ALL_FIXTURES")
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mold nasm
      - name: Restore sccache directory
        id: sccache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/.sccache
          key: gha-sccache-v1-rarpar-publish-preflight-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-rarpar-publish-preflight-
            gha-sccache-v1-rarpar-publish-
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Prime sccache server
        run: |
          sccache --start-server || true
          sccache --zero-stats || true
      - name: Check workspace version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          PUBLISH_PACKAGE: ${{ inputs.package }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import sys

          expected = os.environ["EXPECTED_VERSION"]
          selected_package = os.environ["PUBLISH_PACKAGE"]
          publishable = {
              "weaver-reed-solomon",
              "weaver-unrar",
              "weaver-par2",
          }
          metadata = subprocess.check_output([
              "cargo",
              "metadata",
              "--locked",
              "--format-version",
              "1",
              "--no-deps",
          ])
          packages = json.loads(metadata)["packages"]
          selected = {
              package["name"]: package["version"]
              for package in packages
              if package["name"] in publishable
          }
          rarpar = next(
              (package for package in packages if package["name"] == "rarpar"),
              None,
          )
          if set(selected) != publishable:
              print(
                  f"missing publishable package metadata: got {selected}",
                  file=sys.stderr,
              )
              sys.exit(1)
          if selected_package == "all":
              bad = {name: version for name, version in selected.items() if version != expected}
              if bad:
                  print(
                      f"version mismatch: expected all publishable crates at {expected}, got {selected}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
          elif selected.get(selected_package) != expected:
              print(
                  f"version mismatch: expected {selected_package} {expected}, got {selected}",
                  file=sys.stderr,
              )
              sys.exit(1)
          if rarpar is None or rarpar["version"] != expected or rarpar.get("publish") != []:
              if selected_package == "all":
                  print(
                      f"rarpar must be version {expected} with publish=false, got {rarpar}",
                      file=sys.stderr,
                  )
                  sys.exit(1)
          if rarpar is None or rarpar.get("publish") != []:
              print(f"rarpar must have publish=false, got {rarpar}", file=sys.stderr)
              sys.exit(1)
          PY
      - name: Run publish preflight checks
        run: |
          cargo fmt --check --all
          cargo clippy --locked --workspace --all-targets -- -D warnings
          cargo test --locked --workspace --no-fail-fast
      - name: Verify package contents
        env:
          PUBLISH_PACKAGE: ${{ inputs.package }}
        run: |
          set -euo pipefail
          mkdir -p .ci/package-lists

          if [ "$PUBLISH_PACKAGE" = all ]; then
            crates="weaver-reed-solomon weaver-unrar weaver-par2"
            cargo package --locked -p weaver-reed-solomon
            for crate in weaver-unrar weaver-par2; do
              # Downstream crates may depend on same-version workspace crates.
              # Real publish verification happens below after each upstream
              # crate has reached the crates.io index.
              cargo package --locked --no-verify -p "$crate"
            done
          else
            crates="$PUBLISH_PACKAGE"
            cargo package --locked -p "$PUBLISH_PACKAGE"
          fi

          for crate in $crates; do
            cargo package --locked --list -p "$crate" > ".ci/package-lists/${crate}.txt"
            if grep -n 'tests/fixtures' ".ci/package-lists/${crate}.txt"; then
              echo "::error::${crate} package includes fixture files"
              exit 1
            fi
          done

          if [ -f .ci/package-lists/weaver-unrar.txt ]; then
            grep -Fxq LICENSE .ci/package-lists/weaver-unrar.txt
          fi

          python3 - <<'PY'
          import json
          import os
          import pathlib
          import subprocess
          import sys

          limits = {
              "weaver-reed-solomon": 1_000_000,
              "weaver-unrar": 2_500_000,
              "weaver-par2": 2_500_000,
          }
          selected_package = os.environ["PUBLISH_PACKAGE"]
          if selected_package != "all":
              limits = {selected_package: limits[selected_package]}
          metadata = json.loads(
              subprocess.check_output([
                  "cargo",
                  "metadata",
                  "--locked",
                  "--format-version",
                  "1",
                  "--no-deps",
              ])
          )
          versions = {
              package["name"]: package["version"]
              for package in metadata["packages"]
              if package["name"] in limits
          }
          package_dir = pathlib.Path("target/package")
          failed = False
          for crate, limit in limits.items():
              path = package_dir / f"{crate}-{versions.get(crate)}.crate"
              if not path.exists():
                  print(f"missing packaged crate for {crate} {versions.get(crate)}", file=sys.stderr)
                  failed = True
                  continue
              size = path.stat().st_size
              print(f"{path.name}: {size} bytes")
              if size > limit:
                  print(
                      f"{crate} package is {size} bytes, over {limit} byte limit",
                      file=sys.stderr,
                  )
                  failed = True
          if failed:
              sys.exit(1)
          PY
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache directory
        if: always() && steps.sccache-restore.outcome == 'success'
        uses: actions/cache/save@v6
        with:
          path: ${{ github.workspace }}/.sccache
          key: ${{ steps.sccache-restore.outputs.cache-primary-key }}

  publish:
    name: publish
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    needs: [preflight]
    if: ${{ inputs.dry_run == false }}
    environment: crates-io
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      RUSTFLAGS: --remap-path-prefix=${{ github.workspace }}=. -C link-arg=-fuse-ld=mold
      CC: sccache cc
      CXX: sccache c++
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.96.0
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mold nasm
      - name: Restore sccache directory
        id: sccache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/.sccache
          key: gha-sccache-v1-rarpar-publish-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-rarpar-publish-
            gha-sccache-v1-rarpar-
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Prime sccache server
        run: |
          sccache --start-server || true
          sccache --zero-stats || true
      - name: Check crates.io token secret
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN repository secret is required for crates.io publishing."
            exit 1
          fi
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          PUBLISH_PACKAGE: ${{ inputs.package }}
          PUBLISH_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail

          publish_with_retry() {
            crate="$1"
            for attempt in 1 2 3 4 5 6; do
              echo "Publishing ${crate} (attempt ${attempt})"
              if cargo publish --locked -p "$crate"; then
                return 0
              fi
              if [ "$attempt" -eq 6 ]; then
                return 1
              fi
              sleep 60
            done
          }

          wait_for_crate_version() {
            crate="$1"
            version="$2"
            for attempt in $(seq 1 20); do
              echo "Waiting for ${crate} ${version} in crates.io index (attempt ${attempt})"
              if cargo info "${crate}@${version}" >/dev/null 2>&1; then
                return 0
              fi
              sleep 30
            done
            echo "timed out waiting for ${crate} ${version} in crates.io index" >&2
            return 1
          }

          if [ "$PUBLISH_PACKAGE" = all ]; then
            crates="weaver-reed-solomon weaver-unrar weaver-par2"
          else
            crates="$PUBLISH_PACKAGE"
          fi

          for crate in $crates; do
            publish_with_retry "$crate"
            wait_for_crate_version "$crate" "$PUBLISH_VERSION"
          done
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache directory
        if: always() && steps.sccache-restore.outcome == 'success'
        uses: actions/cache/save@v6
        with:
          path: ${{ github.workspace }}/.sccache
          key: ${{ steps.sccache-restore.outputs.cache-primary-key }}
