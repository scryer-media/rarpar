name: release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and deploy, for example rarpar-v0.1.0.
        required: true
        type: string
  push:
    tags:
      - "rarpar-v*"

concurrency:
  group: rarpar-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  GIT_LFS_SKIP_SMUDGE: "1"
  RARPAR_LFS_TEST_FIXTURES: crates/weaver-unrar/tests/fixtures/rar5/rar5_store.rar,crates/weaver-unrar/tests/fixtures/rar5/rar5_hp_store.rar,crates/weaver-unrar/tests/fixtures/rar5/rar5_enc_store.rar,crates/weaver-unrar/tests/fixtures/rar5/rar5_symlink.rar,crates/weaver-unrar/tests/fixtures/rar4/rar4_tiny_volumes.part*.rar,crates/weaver-par2/tests/fixtures/rar5_lz_plain/**
  RARPAR_LFS_SMOKE_FIXTURES: crates/weaver-unrar/tests/fixtures/rar5/rar5_store.rar
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  preflight:
    name: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      RUSTFLAGS: --remap-path-prefix=${{ github.workspace }}=. -C link-arg=-fuse-ld=mold
      CC: sccache cc
      CXX: sccache c++
      CMAKE_C_COMPILER_LAUNCHER: sccache
      CMAKE_CXX_COMPILER_LAUNCHER: sccache
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Hydrate CLI test fixtures
        run: |
          set -euo pipefail
          git lfs install --local
          git lfs pull --include="$RARPAR_LFS_TEST_FIXTURES" --exclude=""
          git lfs fsck --pointers
          git lfs ls-files --name-only --include="$RARPAR_LFS_TEST_FIXTURES" > .ci-lfs-hydrated.txt
          test -s .ci-lfs-hydrated.txt
          while IFS= read -r path; do
            if head -c 43 "$path" | grep -q '^version https://git-lfs.github.com/spec'; then
              echo "::error::LFS file was not hydrated: $path"
              exit 1
            fi
          done < .ci-lfs-hydrated.txt
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.96.0
          components: clippy, rustfmt
      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends mold nasm mandoc
      - name: Restore sccache directory
        id: sccache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/.sccache
          key: gha-sccache-v1-rarpar-release-preflight-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-rarpar-release-preflight-
            gha-sccache-v1-rarpar-release-
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Prime sccache server
        run: |
          sccache --start-server || true
          sccache --zero-stats || true
      - name: Validate release tag and package versions
        env:
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import subprocess
          import sys

          tag = os.environ["RELEASE_TAG"]
          match = re.fullmatch(r"rarpar-v(\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?)", tag)
          if not match:
              print(f"unexpected release tag format: {tag}", file=sys.stderr)
              sys.exit(1)
          expected = match.group(1)
          metadata = subprocess.check_output([
              "cargo",
              "metadata",
              "--locked",
              "--format-version",
              "1",
              "--no-deps",
          ])
          packages = json.loads(metadata)["packages"]
          required = {
              "weaver-reed-solomon",
              "weaver-unrar",
              "weaver-par2",
              "rarpar",
          }
          selected = {
              package["name"]: package["version"]
              for package in packages
              if package["name"] in required
          }
          missing = sorted(required - selected.keys())
          if missing:
              print(f"workspace is missing packages: {missing}", file=sys.stderr)
              sys.exit(1)
          if selected["rarpar"] != expected:
              print(
                  f"release tag {tag} expects rarpar {expected}, got {selected['rarpar']}",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"release package versions: {selected}")
          PY
      - name: Validate packaged CLI registry dependencies
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#rarpar-v}"
          cargo package --locked --no-verify -p rarpar
          rm -rf "$RUNNER_TEMP/rarpar-release-source"
          mkdir -p "$RUNNER_TEMP/rarpar-release-source"
          tar -xzf "target/package/rarpar-${version}.crate" -C "$RUNNER_TEMP/rarpar-release-source"
          manifest="$RUNNER_TEMP/rarpar-release-source/rarpar-${version}/Cargo.toml"
          cargo metadata --locked --format-version 1 --no-deps \
            --manifest-path "$manifest" \
            > "$RUNNER_TEMP/rarpar-release-source/metadata.json"
          python3 - "$RUNNER_TEMP/rarpar-release-source/metadata.json" <<'PY'
          import json
          import sys

          metadata = json.load(open(sys.argv[1], "r", encoding="utf-8"))
          package = next(
              package for package in metadata["packages"] if package["name"] == "rarpar"
          )
          dependencies = {dep["name"]: dep for dep in package["dependencies"]}
          for name in ("weaver-par2", "weaver-unrar"):
              dep = dependencies.get(name)
              if dep is None:
                  print(f"missing dependency: {name}", file=sys.stderr)
                  sys.exit(1)
              if dep.get("source") is None or dep.get("path"):
                  print(f"{name} still has a path dependency in packaged manifest", file=sys.stderr)
                  sys.exit(1)
              version = dep.get("req")
              if not version:
                  print(f"{name} is missing a registry version", file=sys.stderr)
                  sys.exit(1)
              print(f"packaged dependency: {name} {version}")
          PY
      - name: Run release preflight checks
        run: |
          cargo fmt --check --all
          cargo run --locked -p xtask -- docs --check
          cargo run --locked -p xtask -- docs --out target/dist/docs
          mandoc -Tlint target/dist/docs/share/man/man1/rarpar.1
          cargo clippy --locked -p rarpar --all-targets -- -D warnings
          cargo test --locked -p rarpar --no-fail-fast
      - name: Show sccache stats
        if: always()
        run: sccache --show-stats || true
      - name: Save sccache directory
        if: always() && steps.sccache-restore.outcome == 'success'
        uses: actions/cache/save@v6
        with:
          path: ${{ github.workspace }}/.sccache
          key: ${{ steps.sccache-restore.outputs.cache-primary-key }}

  build:
    name: build-${{ matrix.platform }}
    needs: [preflight]
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 45
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_DIR: ${{ github.workspace }}/.sccache
      RARPAR_RELEASE_TARGET_DIR: ${{ github.workspace }}/target/rarpar-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x86_64-gnu
            runs_on: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            archive_ext: tar.gz
          - platform: linux-arm64-gnu
            runs_on: ubuntu-22.04-arm
            target: aarch64-unknown-linux-gnu
            archive_ext: tar.gz
          - platform: linux-x86_64-musl
            runs_on: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            archive_ext: tar.gz
          - platform: linux-arm64-musl
            runs_on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-musl
            archive_ext: tar.gz
          - platform: darwin-arm64
            runs_on: macos-26
            target: aarch64-apple-darwin
            archive_ext: tar.gz
          - platform: darwin-x86_64
            runs_on: macos-26-intel
            target: x86_64-apple-darwin
            archive_ext: tar.gz
          - platform: windows-x86_64
            runs_on: windows-2025-vs2026
            target: x86_64-pc-windows-msvc
            archive_ext: zip
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Hydrate smoke fixtures
        shell: bash
        run: |
          set -euo pipefail
          git lfs install --local
          git lfs pull --include="$RARPAR_LFS_SMOKE_FIXTURES" --exclude=""
          git lfs fsck --pointers
          git lfs ls-files --name-only --include="$RARPAR_LFS_SMOKE_FIXTURES" > .ci-lfs-hydrated.txt
          test -s .ci-lfs-hydrated.txt
          while IFS= read -r path; do
            if head -c 43 "$path" | grep -q '^version https://git-lfs.github.com/spec'; then
              echo "::error::LFS file was not hydrated: $path"
              exit 1
            fi
          done < .ci-lfs-hydrated.txt
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.96.0
          targets: ${{ matrix.target }}
      - name: Install native build dependencies (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          packages=(mold)
          case "$TARGET" in
            x86_64-*) packages+=(nasm) ;;
          esac
          case "$TARGET" in
            *-musl) packages+=(musl-tools) ;;
          esac
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends "${packages[@]}"
      - name: Install NASM (macOS)
        if: matrix.platform == 'darwin-x86_64'
        run: brew install nasm
      - name: Install NASM (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $url = "https://www.nasm.us/pub/nasm/releasebuilds/3.01/win64/nasm-3.01-win64.zip"
          $expectedSha256 = "e0ba5157007abc7b1a65118a96657a961ddf55f7e3f632ee035366dfce039ca4"
          Invoke-WebRequest $url -OutFile nasm.zip
          $actualSha256 = (Get-FileHash nasm.zip -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualSha256 -ne $expectedSha256) {
            throw "NASM checksum mismatch: expected $expectedSha256, got $actualSha256"
          }
          Expand-Archive nasm.zip -DestinationPath C:\nasm
          $dir = (Get-ChildItem C:\nasm -Directory | Select-Object -First 1).FullName
          $dir | Out-File -Append -Encoding utf8 $env:GITHUB_PATH
      - name: Exclude build dir from Windows Defender
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          try {
            Add-MpPreference -ExclusionPath "${{ github.workspace }}" -ErrorAction Stop
          } catch {
            Write-Warning "Unable to configure Windows Defender exclusion: $($_.Exception.Message)"
          }
      - name: Restore sccache directory
        id: sccache-restore
        uses: actions/cache/restore@v6
        with:
          path: ${{ github.workspace }}/.sccache
          key: gha-sccache-v1-rarpar-release-${{ matrix.platform }}-${{ github.run_id }}
          restore-keys: |
            gha-sccache-v1-rarpar-release-${{ matrix.platform }}-
            gha-sccache-v1-rarpar-release-
      - name: Install sccache
        uses: mozilla-actions/sccache-action@v0.0.10
      - name: Configure build environment (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> "$GITHUB_ENV"

          case "${{ runner.os }}" in
            Linux)
              echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}=. -C link-arg=-fuse-ld=mold" >> "$GITHUB_ENV"
              case "${{ matrix.target }}" in
                *-musl)
                  target_env="${{ matrix.target }}"
                  target_env="${target_env//-/_}"
                  printf 'CC_%s=%s\n' "$target_env" "sccache musl-gcc" >> "$GITHUB_ENV"
                  ;;
                *)
                  echo "CC=sccache cc" >> "$GITHUB_ENV"
                  echo "CXX=sccache c++" >> "$GITHUB_ENV"
                  ;;
              esac
              ;;
            macOS)
              echo "RUSTFLAGS=--remap-path-prefix=${GITHUB_WORKSPACE}=." >> "$GITHUB_ENV"
              echo "CC=sccache clang" >> "$GITHUB_ENV"
              echo "CXX=sccache clang++" >> "$GITHUB_ENV"
              ;;
          esac
      - name: Configure build environment (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          "RUSTFLAGS=--remap-path-prefix=$env:GITHUB_WORKSPACE=. -Clinker=lld-link" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "CMAKE_C_COMPILER_LAUNCHER=sccache" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
          "CMAKE_CXX_COMPILER_LAUNCHER=sccache" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - name: Prime sccache server
        shell: bash
        run: |
          sccache --start-server || true
          sccache --zero-stats || true
      - name: Stage rarpar release source (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#rarpar-v}"
          cargo package --locked --no-verify -p rarpar
          rm -rf "$RUNNER_TEMP/rarpar-release-source"
          mkdir -p "$RUNNER_TEMP/rarpar-release-source"
          tar -xzf "target/package/rarpar-${version}.crate" -C "$RUNNER_TEMP/rarpar-release-source"
          source_dir="$RUNNER_TEMP/rarpar-release-source/rarpar-${version}"
          cargo metadata --locked --format-version 1 --no-deps \
            --manifest-path "$source_dir/Cargo.toml" \
            > "$RUNNER_TEMP/rarpar-release-source/metadata.json"
          python3 - "$RUNNER_TEMP/rarpar-release-source/metadata.json" <<'PY'
          import json
          import sys

          metadata = json.load(open(sys.argv[1], "r", encoding="utf-8"))
          package = next(
              package for package in metadata["packages"] if package["name"] == "rarpar"
          )
          dependencies = {dep["name"]: dep for dep in package["dependencies"]}
          for name in ("weaver-par2", "weaver-unrar"):
              dep = dependencies.get(name)
              if dep is None or dep.get("source") is None or dep.get("path") or not dep.get("req"):
                  print(f"{name} must be a registry dependency in packaged rarpar", file=sys.stderr)
                  sys.exit(1)
          PY
          echo "RARPAR_RELEASE_SOURCE=$source_dir" >> "$GITHUB_ENV"
      - name: Stage rarpar release source (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:RELEASE_TAG -replace '^rarpar-v', ''
          cargo package --locked --no-verify -p rarpar
          $root = Join-Path $env:RUNNER_TEMP "rarpar-release-source"
          Remove-Item -Recurse -Force $root -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $root | Out-Null
          tar -xzf "target/package/rarpar-$version.crate" -C $root
          $sourceDir = Join-Path $root "rarpar-$version"
          $manifest = Join-Path $sourceDir "Cargo.toml"
          $metadata = Join-Path $root "metadata.json"
          cargo metadata --locked --format-version 1 --no-deps --manifest-path $manifest `
            | Out-File -Encoding utf8 $metadata
          $check = @'
          import json
          import sys

          metadata = json.load(open(sys.argv[1], "r", encoding="utf-8"))
          package = next(
              package for package in metadata["packages"] if package["name"] == "rarpar"
          )
          dependencies = {dep["name"]: dep for dep in package["dependencies"]}
          for name in ("weaver-par2", "weaver-unrar"):
              dep = dependencies.get(name)
              if dep is None or dep.get("source") is None or dep.get("path") or not dep.get("req"):
                  print(f"{name} must be a registry dependency in packaged rarpar", file=sys.stderr)
                  sys.exit(1)
          '@
          $check | python3 - $metadata
          if ($LASTEXITCODE -ne 0) {
            throw "packaged rarpar manifest dependency validation failed"
          }
          "RARPAR_RELEASE_SOURCE=$sourceDir" | Out-File -Append -Encoding utf8 $env:GITHUB_ENV
      - name: Build rarpar (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p logs
          cargo build --locked --release \
            --manifest-path "$RARPAR_RELEASE_SOURCE/Cargo.toml" \
            --target "${{ matrix.target }}" \
            --target-dir "$RARPAR_RELEASE_TARGET_DIR" 2>&1 \
            | tee "logs/rarpar-${{ matrix.platform }}-build.log"
      - name: Build rarpar (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force logs | Out-Null
          $manifest = Join-Path $env:RARPAR_RELEASE_SOURCE "Cargo.toml"
          cargo build --locked --release `
            --manifest-path $manifest `
            --target ${{ matrix.target }} `
            --target-dir $env:RARPAR_RELEASE_TARGET_DIR 2>&1 `
            | Tee-Object -FilePath "logs\rarpar-${{ matrix.platform }}-build.log"
      - name: Generate manpage and completions
        shell: bash
        run: cargo run --locked -p xtask -- docs --out target/dist/docs
      - name: Smoke test release binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          exe="$RARPAR_RELEASE_TARGET_DIR/${{ matrix.target }}/release/rarpar"
          "$exe" --help > "logs/rarpar-${{ matrix.platform }}-help.log"
          "$exe" lb crates/weaver-unrar/tests/fixtures/rar5/rar5_store.rar \
            > "logs/rarpar-${{ matrix.platform }}-lb.log"
          grep -Fxq small.txt "logs/rarpar-${{ matrix.platform }}-lb.log"
      - name: Smoke test release binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $exe = Join-Path $env:RARPAR_RELEASE_TARGET_DIR "${{ matrix.target }}\release\rarpar.exe"
          & $exe --help | Tee-Object -FilePath "logs\rarpar-${{ matrix.platform }}-help.log"
          & $exe lb crates\weaver-unrar\tests\fixtures\rar5\rar5_store.rar `
            | Tee-Object -FilePath "logs\rarpar-${{ matrix.platform }}-lb.log"
          if (-not (Select-String -Path "logs\rarpar-${{ matrix.platform }}-lb.log" -Pattern '^small\.txt$' -Quiet)) {
            throw "rarpar lb smoke test did not list small.txt"
          }
      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          archive="rarpar-${RELEASE_TAG}-${{ matrix.platform }}.${{ matrix.archive_ext }}"
          rm -rf package
          mkdir -p package dist
          cp "$RARPAR_RELEASE_TARGET_DIR/${{ matrix.target }}/release/rarpar" package/
          cp README.md LICENSE package/
          cp crates/weaver-unrar/LICENSE package/LICENSE.weaver-unrar
          cp -R target/dist/docs/share package/share
          tar -czf "$archive" -C package .
          mv "$archive" dist/
      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $archive = "rarpar-$env:RELEASE_TAG-${{ matrix.platform }}.${{ matrix.archive_ext }}"
          Remove-Item -Recurse -Force package -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force package, dist | Out-Null
          Copy-Item (Join-Path $env:RARPAR_RELEASE_TARGET_DIR "${{ matrix.target }}\release\rarpar.exe") package\
          Copy-Item README.md package\
          Copy-Item LICENSE package\
          Copy-Item crates\weaver-unrar\LICENSE package\LICENSE.weaver-unrar
          Copy-Item target\dist\docs\share package\share -Recurse
          Compress-Archive -Path package\* -DestinationPath $archive
          Move-Item $archive dist\
      - name: Stage package root inspection artifact (Linux GNU)
        if: runner.os == 'Linux' && endsWith(matrix.platform, '-gnu')
        shell: bash
        run: |
          set -euo pipefail
          rm -rf package-root package-roots
          mkdir -p package-roots
          cargo run --locked -p xtask -- package-root \
            --binary "$RARPAR_RELEASE_TARGET_DIR/${{ matrix.target }}/release/rarpar" \
            --docs target/dist/docs \
            --out package-root \
            --target "${{ matrix.target }}"
          tar -czf "package-roots/package-root-${RELEASE_TAG}-${{ matrix.platform }}.tar.gz" \
            -C package-root .
      - name: Show sccache stats
        if: always()
        shell: bash
        run: |
          if command -v sccache >/dev/null 2>&1; then
            sccache --show-stats | tee "logs/rarpar-${{ matrix.platform }}-sccache-stats.txt"
          else
            echo "sccache not installed" | tee "logs/rarpar-${{ matrix.platform }}-sccache-stats.txt"
          fi
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rarpar-release-${{ matrix.platform }}
          path: |
            dist/*
            logs/*
          if-no-files-found: error
          retention-days: 14
      - name: Upload package root inspection artifact
        if: runner.os == 'Linux' && endsWith(matrix.platform, '-gnu')
        uses: actions/upload-artifact@v7
        with:
          name: rarpar-package-root-${{ matrix.platform }}
          path: package-roots/*
          if-no-files-found: error
          retention-days: 14

  deploy:
    name: deploy-github-release
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ env.RELEASE_TAG }}
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: rarpar-release-*
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          checksum_file="$(mktemp)"
          find . -maxdepth 1 -type f \( -name 'rarpar-*.tar.gz' -o -name 'rarpar-*.zip' \) ! -name '*package-root*' -print0 \
            | sort -z \
            | xargs -0 sha256sum > "$checksum_file"
          mv "$checksum_file" SHA256SUMS
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          release_files=(dist/rarpar-*.tar.gz dist/rarpar-*.zip dist/SHA256SUMS)
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${release_files[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${release_files[@]}" \
              --title "$RELEASE_TAG" \
              --notes "rarpar ${RELEASE_TAG}"
          fi
      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_PUSH_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${TAP_TOKEN:-}" ]; then
            echo "TAP_PUSH_TOKEN not set; skipping tap update."
            exit 0
          fi

          VERSION="${RELEASE_TAG#rarpar-v}"
          LINUX_X86_GNU_SHA=$(shasum -a 256 "dist/rarpar-${RELEASE_TAG}-linux-x86_64-gnu.tar.gz" | cut -d ' ' -f1)
          LINUX_X86_MUSL_SHA=$(shasum -a 256 "dist/rarpar-${RELEASE_TAG}-linux-x86_64-musl.tar.gz" | cut -d ' ' -f1)
          LINUX_ARM_GNU_SHA=$(shasum -a 256 "dist/rarpar-${RELEASE_TAG}-linux-arm64-gnu.tar.gz" | cut -d ' ' -f1)
          LINUX_ARM_MUSL_SHA=$(shasum -a 256 "dist/rarpar-${RELEASE_TAG}-linux-arm64-musl.tar.gz" | cut -d ' ' -f1)
          DARWIN_ARM_SHA=$(shasum -a 256 "dist/rarpar-${RELEASE_TAG}-darwin-arm64.tar.gz" | cut -d ' ' -f1)
          DARWIN_X86_SHA=$(shasum -a 256 "dist/rarpar-${RELEASE_TAG}-darwin-x86_64.tar.gz" | cut -d ' ' -f1)
          REPO="${{ github.repository }}"

          mkdir -p tap/Formula
          cat > tap/Formula/rarpar.rb << FORMULA
          require "open3"

          module RarparReleaseSelection
            MIN_GLIBC_VERSION = [2, 35].freeze

            def self.glibc_supported?
              version = glibc_version
              return false unless version

              (version <=> MIN_GLIBC_VERSION) >= 0
            end

            def self.glibc_version
              output = capture_getconf || capture_ldd
              match = output.to_s.match(/(?:glibc|GNU libc|GLIBC)[^0-9]*(\d+)\.(\d+)/i)
              return unless match

              [match[1].to_i, match[2].to_i]
            end

            def self.capture_getconf
              output, status = Open3.capture2("getconf", "GNU_LIBC_VERSION")
              status.success? ? output.strip : nil
            rescue StandardError
              nil
            end

            def self.capture_ldd
              output, status = Open3.capture2e("ldd", "--version")
              status.success? ? output.lines.first.to_s.strip : nil
            rescue StandardError
              nil
            end
          end

          class Rarpar < Formula
            desc "Smart RAR/PAR2 repair and extraction CLI"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "GPL-3.0-or-later"

            on_macos do
              on_arm do
                url "https://github.com/${REPO}/releases/download/rarpar-v${VERSION}/rarpar-rarpar-v${VERSION}-darwin-arm64.tar.gz"
                sha256 "${DARWIN_ARM_SHA}"
              end

              on_intel do
                url "https://github.com/${REPO}/releases/download/rarpar-v${VERSION}/rarpar-rarpar-v${VERSION}-darwin-x86_64.tar.gz"
                sha256 "${DARWIN_X86_SHA}"
              end
            end

            on_linux do
              on_arm do
                if RarparReleaseSelection.glibc_supported?
                  url "https://github.com/${REPO}/releases/download/rarpar-v${VERSION}/rarpar-rarpar-v${VERSION}-linux-arm64-gnu.tar.gz"
                  sha256 "${LINUX_ARM_GNU_SHA}"
                else
                  url "https://github.com/${REPO}/releases/download/rarpar-v${VERSION}/rarpar-rarpar-v${VERSION}-linux-arm64-musl.tar.gz"
                  sha256 "${LINUX_ARM_MUSL_SHA}"
                end
              end

              on_intel do
                if RarparReleaseSelection.glibc_supported?
                  url "https://github.com/${REPO}/releases/download/rarpar-v${VERSION}/rarpar-rarpar-v${VERSION}-linux-x86_64-gnu.tar.gz"
                  sha256 "${LINUX_X86_GNU_SHA}"
                else
                  url "https://github.com/${REPO}/releases/download/rarpar-v${VERSION}/rarpar-rarpar-v${VERSION}-linux-x86_64-musl.tar.gz"
                  sha256 "${LINUX_X86_MUSL_SHA}"
                end
              end
            end

            def install
              bin.install "rarpar"
              man1.install "share/man/man1/rarpar.1" if File.exist?("share/man/man1/rarpar.1")
              bash_completion.install "share/bash-completion/completions/rarpar" if File.exist?("share/bash-completion/completions/rarpar")
              zsh_completion.install "share/zsh/site-functions/_rarpar" if File.exist?("share/zsh/site-functions/_rarpar")
              fish_completion.install "share/fish/vendor_completions.d/rarpar.fish" if File.exist?("share/fish/vendor_completions.d/rarpar.fish")
              pkgshare.install "README.md" if File.exist?("README.md")
              pkgshare.install "LICENSE" if File.exist?("LICENSE")
              pkgshare.install "LICENSE.weaver-unrar" if File.exist?("LICENSE.weaver-unrar")
            end

            test do
              assert_match "rarpar", shell_output("#{bin}/rarpar --help")
              assert_path_exists man1/"rarpar.1"
            end
          end
          FORMULA

          sed -i 's/^          //' tap/Formula/rarpar.rb
          ruby -c tap/Formula/rarpar.rb

          git clone "https://${TAP_TOKEN}@github.com/scryer-media/homebrew-rarpar.git" tap-repo
          mkdir -p tap-repo/Formula
          cp tap/Formula/rarpar.rb tap-repo/Formula/rarpar.rb
          cd tap-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/rarpar.rb
          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date."
          else
            git commit -m "rarpar ${VERSION}"
            git push origin HEAD:main
          fi
